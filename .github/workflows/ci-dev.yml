name: CI (dev)

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Compile Paraglide
        run: npx @inlang/paraglide-js compile --project ./project.inlang

      - name: Svelte check
        run: pnpm check

      - name: Lint (Prettier)
        run: pnpm lint

  build-frontend:
    needs: lint-and-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Compile Paraglide
        run: npx @inlang/paraglide-js compile --project ./project.inlang

      - name: Build frontend
        run: pnpm build
