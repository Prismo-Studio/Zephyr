name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for this release (e.g. 1.0.2)'
        required: true
        default: '0.0.0'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles msi,nsis'
            label: Windows
            rust-targets: ''
          - platform: ubuntu-24.04
            args: '--bundles appimage,deb'
            label: Ubuntu
            rust-targets: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macOS (Apple Silicon)
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macOS (Intel)
            rust-targets: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev librsvg2-dev libudev-dev patchelf \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2

      - name: Install frontend dependencies
        run: pnpm install

      - name: Set version in package.json
        run: pnpm pkg set version=${{ github.event.inputs.version }}

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          cd src-tauri
          sed -i.bak 's/"version": "[^"]*"/"version": "${{ github.event.inputs.version }}"/' tauri.conf.json
          rm -f tauri.conf.json.bak

      - name: Set version in Cargo.toml
        shell: bash
        run: |
          cd src-tauri
          sed -i.bak 's/^version = "[^"]*"/version = "${{ github.event.inputs.version }}"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: v${{ github.event.inputs.version }}
          releaseName: 'Zephyr v${{ github.event.inputs.version }}'
          releaseBody: |
            ## Zephyr v${{ github.event.inputs.version }}

            ### Downloads
            - **Windows**: `.msi` or `.exe` installer
            - **Linux**: `.AppImage` or `.deb` package
            - **macOS**: `.dmg` (Apple Silicon & Intel)

            ---
            *Built from commit ${{ github.sha }}*
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  post-release:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --staged --quiet || (git commit -m "chore: update latest.json for v${{ github.event.inputs.version }}" && git push)
